name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight deps
        run: |
          python -m pip install -U pip
          pip install ruff pytest numpy pandas scikit-learn

      - name: Ruff
        run: ruff check src

      - name: Pytest (metrics only, no TF)
        run: PYTHONPATH=src pytest tests/test_metrics.py -q
