title = "gitleaks"

[extend]
useDefault = true

[allowlist]
description = "common false positives"
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)vendor/''',
  '''(^|/)\.venv/''',
  '''(^|/)venv/''',
  '''(^|/)__pycache__/''',
  '''(^|/)\.git/''',
  '''\.lock$''',
  '''package-lock\.json$''',
  '''pnpm-lock\.yaml$''',
  '''yarn\.lock$''',
  '''poetry\.lock$''',
  '''Cargo\.lock$''',
  '''go\.sum$''',
]
